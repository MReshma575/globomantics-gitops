apiVersion: apps/v1
kind: Deployment
metadata:
    name: globomantics
    spec:
        replicas: 1
            selector:
                  matchLabels:
                          app: globomantics
                              template:
                                    metadata:
                                            labels:
                                                      app: globomantics
                                                            spec:
                                                                    containers:
                                                                              - name: globomantics
                                                                                          image: nginx
                                                                                                      ports:
                                                                                                                    - containerPort: 80
